<div data-sly-use.title="com.adobe.cq.wcm.core.components.models.Title"
     data-sly-use.template="core/wcm/components/commons/v1/templates.html"
     data-cmp-data-layer="${title.data.json}"
     id="${title.id}"
     class="cmp-supertitle ${properties.scrollReveal == 'true' ? 'cmp-supertitle--reveal' : ''} ${(properties.enableNeon == 'true' || properties.enableNeon) ? 'cmp-supertitle--neon' : ''}">
    <h1 class="cmp-title__text js-title ${properties.style} ${properties.size}" style="color: ${properties.color @ context='styleString'};" data-sly-element="${title.type}">
        <a  data-sly-unwrap="${!title.link.valid || title.linkDisabled}"
            class="cmp-title__link"
            data-sly-attribute="${title.link.htmlAttributes}"
            data-cmp-clickable="${title.data ? true : false}">${properties.jcr:title}</a></h1>
</div>
<sly data-sly-call="${template.placeholder @ isEmpty=!properties.jcr:title, classAppend='cmp-title'}"></sly>
<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html" data-sly-call="${clientlib.all @ categories='itv.components.supertitle'}"></sly>
