<div data-sly-use.textModel="com.adobe.cq.wcm.core.components.models.Text"
     data-sly-use.component="com.adobe.cq.wcm.core.components.models.Component"
     data-sly-use.templates="core/wcm/components/commons/v1/templates.html"
     data-sly-test.text="${textModel.text}"
     data-cmp-data-layer="${textModel.data.json}"
     id="${component.id}"
     class="cmp-supertext ${properties.style}">
   <h3 class="cmp-supertext__title" data-sly-test="${properties.textTitle}">${properties.textTitle}</h3>
   <div class="cmp-supertext__content"
       data-sly-test="${properties.text}">${properties.text @ context='html'}</div>
   <div class="cmp-supertext__author" data-sly-test="${properties.style == 'cmp-supertext--quote' && properties.author}">
      - ${properties.author}</div>
</div>
<sly data-sly-call="${templates.placeholder @ isEmpty = !text, classAppend='cmp-text'}"></sly>
<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html" data-sly-call="${clientlib.all @ categories='itv.components.supertext'}"></sly>
