<sly data-sly-use.model="com.itv.core.models.CardsModel"/>

<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html"/>
    <div class="cardlist cardlist--${properties.layout}">
        <sly data-sly-list.card="${model.cards}">
            <div class="cardlist__card">
                <img class="cardlist__image" src="${card.image}" alt="${card.title}"/>
                <h2 class="cardlist__title">${card.title}</h2>
                <span class="cardlist__author">${card.author}</span>
                
                <sly data-sly-test="${properties.layout == 'vertical' && properties.showButtons}">
                    <div class="cardlist__button">
                        <sly data-sly-resource="${cardList.index @ resourceType='core/wcm/components/button/v2/button'}"></sly>
                    </div>
                </sly>
            </div>
        </sly>
    </div>
<sly data-sly-call="${clientlib.css @ categories='itv.components.cardlist'}"/>
