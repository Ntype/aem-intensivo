<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html"/>
<sly data-sly-use.model="com.itv.core.models.SnsModel"></sly>

<sly data-sly-test="${model.snsList}">
    <div class="itv-sns">
        <sly data-sly-list.item="${model.snsList}">
            <a href="${item.link}" target="_blank" rel="noopener noreferrer" x-cq-linkchecker="skip" class="itv-sns__link" aria-label="${item.name}">
                <img src="${item.icon}" alt="${item.name}" class="itv-sns__icon"/>
                <span class="itv-sns__read-only">${item.name}</span>
            </a>
        </sly>
    </div>
</sly>

<sly data-sly-call="${templates.placeholder @ isEmpty = !model.snsList}"></sly>
