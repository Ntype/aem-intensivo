<sly data-sly-use.analytics="com.itv.core.models.AnalyticsModel"></sly>

<sly data-sly-test="${wcmmode.disabled}">

    <link href="https://cdn.jsdelivr.net/npm/tarteaucitronjs@1.32.0/css/tarteaucitron.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tarteaucitronjs@1.32.0/tarteaucitron.min.js"></script>

    <script>
        tarteaucitron.init({
            "privacyUrl": "/content/itv/us/en/privacy-policy.html",
            "bodyPosition": "top",
            "hashtag": "#tarteaucitron",
            "cookieName": "tarteaucitron",
            "orientation": "middle",
            "groupServices": false,
            "showDetailsOnClick": true,
            "serviceDefaultState": "wait",
            "showAlertSmall": false,
            "cookieslist": false,
            "cookieslistEmbed": false,
            "showIcon": false,
            "iconPosition": "BottomRight",
            "adblocker": false,
            "DenyAllCta" : true,
            "AcceptAllCta" : true,
            "highPrivacy": true,
            "alwaysNeedConsent": false,
            "handleBrowserDNTRequest": false,
            "removeCredit": false,
            "moreInfoLink": true,
            "useExternalCss": true,
            "useExternalJs": false,
            "mandatory": true,
            "mandatoryCta": true,
            "googleConsentMode": false,
            "bingConsentMode": true,
            "pianoConsentMode": true,
            "pianoConsentModeEssential": false,
            "softConsentMode": false,
            "dataLayer": true,
            "serverSide": false,
            "partnersList": false
        });
    </script>

    <sly data-sly-test="${analytics.googleAnalyticsId}">
        <script>
            tarteaucitron.user.gtagUa = '${analytics.googleAnalyticsId @ context="scriptString"}';
            tarteaucitron.user.gtagMore = function () { 
            };
            (tarteaucitron.job = tarteaucitron.job || []).push('gtag');
        </script>
    </sly>

</sly>

<sly data-sly-use.clientlib="core/wcm/components/commons/v1/templates/clientlib.html">
    <sly data-sly-call="${clientlib.css @ categories='itv.base'}"/>
</sly>
<sly data-sly-resource="${'contexthub' @ resourceType='granite/contexthub/components/contexthub'}"/>
